<style>
    /* ===== Contact Page Styles ===== */

    .contact-page {
        padding-top: 12rem;
        min-height: 100vh;
        background: black;
    }

    .contact-heading {
        text-align: center;
        font-size: 5rem;
        margin-bottom: 5rem;
        font-weight: 700;
    }

    .contact-wrapper {
        max-width: 1100px;
        margin: auto;
        display: grid;
        grid-template-columns: 1fr 1.2fr;
        gap: 4rem;
    }

    /* ===== Left Info Card ===== */

    .contact-info {
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(12px);
        padding: 3rem;
        border-radius: 2rem;
        border: 1px solid rgba(183,75,75,0.3);
        transition: 0.4s ease;
    }

    .contact-info:hover {
        transform: translateY(-6px);
        box-shadow: 0 0 25px rgba(183,75,75,0.5);
    }

    .contact-info h2 {
        color: #b74b4b;
        font-size: 2.6rem;
        margin-bottom: 2rem;
    }

    .info-item {
        margin-bottom: 2rem;
        font-size: 1.5rem;
        opacity: 0.9;
    }

    /* ===== Form ===== */

    .contact-form {
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(12px);
        padding: 3rem;
        border-radius: 2rem;
        border: 1px solid rgba(183,75,75,0.3);
    }

    .contact-form h2 {
        color: #b74b4b;
        font-size: 2.6rem;
        margin-bottom: 2rem;
    }

    .input-box {
        display: flex;
        flex-direction: column;
        margin-bottom: 2rem;
    }

    .input-box input,
    .input-box textarea {
        padding: 1.4rem;
        background: #111;
        border: 1px solid rgba(183,75,75,0.4);
        border-radius: 1rem;
        color: white;
        font-size: 1.4rem;
        transition: 0.3s ease;
    }

    .input-box input:focus,
    .input-box textarea:focus {
        border-color: #b74b4b;
        box-shadow: 0 0 10px #b74b4b;
    }

    .input-box textarea {
        resize: none;
        min-height: 140px;
    }

    .contact-btn {
        width: 100%;
        margin-top: 1rem;
    }

    /* ===== Responsive ===== */

    @media (max-width: 900px) {
        .contact-wrapper {
            grid-template-columns: 1fr;
        }

        .contact-heading {
            font-size: 3.5rem;
        }
    }
</style>
