<style>
    /* ===== Contact Page Styles ===== */

    .contact-page {
        padding-top: 12rem;
        min-height: 100vh;
        background: black;
    }

    .contact-heading {
        text-align: center;
        font-size: 5rem;
        margin-bottom: 5rem;
        font-weight: 700;
    }

    .contact-wrapper {
        max-width: 1100px;
        margin: auto;
        display: grid;
        grid-template-columns: 1fr 1.2fr;
        gap: 4rem;
    }

    /* ===== Left Info Card ===== */

    .contact-info {

        backdrop-filter: blur(12px);

/* ===== Form ===== */

.contact-form {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    padding: 3rem;
    border-radius: 2rem;
    border: 1px solid rgba(183,75,75,0.3);
}

.contact-form h2 {
    color: #b74b4b;
    font-size: 2.4rem;
    margin-bottom: 2rem;
}

.input-box {
    display: flex;
    flex-direction: column;
    margin-bottom: 2rem;
}

.input-box input,
.input-box textarea {
    width: 100%;
    padding: 1.4rem;
    background: #111;
    border: 1px solid rgba(183,75,75,0.4);
    border-radius: 1rem;
    color: white;
    font-size: 1.4rem;
    transition: 0.3s ease;
}

.input-box input:focus,
.input-box textarea:focus {
    border-color: #b74b4b;
    box-shadow: 0 0 10px #b74b4b;
}

.input-box textarea {
    resize: none;
    min-height: 140px;
}

.contact-btn {
    width: 100%;
    margin-top: 1rem;
}

/* ===== Tablet ===== */

@media (max-width: 900px) {

    .contact-wrapper {
        grid-template-columns: 1fr;
    }

    .contact-info,
    .contact-form {
        padding: 2rem;
    }

}

/* ===== Mobile ===== */

@media (max-width: 500px) {

    header {
        flex-direction: column;
        gap: 1rem;
    }

    nav {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 1rem;
    }

    .contact-page {
        padding: 10rem 6%;
    }

    .contact-heading {
        font-size: 2.5rem;
    }

    .info-item {
        font-size: 1.3rem;
    }

}
