<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills | Gore Sentinel</title>
    <link rel="stylesheet" href="style.css">


<style>
    /* ===== Skills Page ===== */

    .skills-page {
        padding-top: 12rem;
        min-height: 100vh;
        background: black;
    }

    .skills-heading {
        text-align: center;
        font-size: 5rem;
        margin-bottom: 5rem;
        font-weight: 700;
    }

    .skills-wrapper {
        max-width: 1100px;
        margin: auto;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 3rem;
    }

    /* ===== Skill Category Card ===== */

    .skill-card {
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(12px);
        padding: 3rem;
        border-radius: 2rem;
        border: 1px solid rgba(183,75,75,0.3);
        transition: 0.4s ease;
    }

    .skill-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 0 25px rgba(183,75,75,0.5);
    }

    .skill-card h2 {
        color: #b74b4b;
        font-size: 2.4rem;
        margin-bottom: 2rem;
    }

    /* ===== Progress Bars ===== */

    .skill {
        margin-bottom: 2rem;
    }

    .skill-name {
        display: flex;
        justify-content: space-between;
        font-size: 1.4rem;
        margin-bottom: 0.6rem;
    }

    .progress-bar {
        width: 100%;
        height: 10px;
        background: #111;
        border-radius: 10px;
        overflow: hidden;
    }

    .progress {
        height: 100%;
        background: linear-gradient(90deg, #b74b4b, #ff6b6b);
        width: 0;
        border-radius: 10px;
        animation: fillBar 2s ease forwards;
    }

    @keyframes fillBar {
        from { width: 0; }
    }

    /* ===== Responsive ===== */

    @media (max-width: 900px) {
        .skills-wrapper {
            grid-template-columns: 1fr;
        }

        .skills-heading {
            font-size: 3.5rem;
        }
    }
</style>


</head>

<body>

<header>
    <a href="index.html" class="logo">Gore-Sentinel</a>


<nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="skills.html" class="active">Skills</a>
    <a href="education.html">Education</a>
    <a href="experience.html">Experience</a>
	<a href="certificates.html">Certificates</a>
    <a href="contact.html">Contact</a>
</nav>


</header>

<section class="skills-page">

<div class="skills-wrapper">

    <!-- Programming -->

            </div>

        <div class="skill">

    </div>

    <!-- Cyber Security -->

        <div class="skill">

            </div>

                <div class="progress" style="width:65%"></div>
            </div>
        </div>
    </div>

</div>


</section>

</body>
</html>
